spring.application.name=spring-rag-app
server.port=8082

# ── Google GenAI (Gemini) Configuration ──
# Set the GEMINI_API_KEY environment variable before starting the app.
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.2

# ── ONNX Local Embeddings (custom bean in AiConfig, no DJL engine required) ──
spring.ai.embedding.transformer.enabled=false
# Allow our @Primary custom embeddingModel bean to override the auto-configured one
spring.main.allow-bean-definition-overriding=true
# Disable Google GenAI embedding model auto-config (we use ONNX locally, not text-embedding-004)
spring.ai.google.genai.embedding.enabled=false

# ── Spring AI Retry — disable retries to avoid burning quota on errors ──
# Default is 10 attempts — a single failed query could make 10 Gemini API calls
spring.ai.retry.max-attempts=1
spring.ai.retry.on-client-errors=false

# ── JWT Configuration ──
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=3600000

# ── File Upload Configuration ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Document Chunking ──
app.rag.chunk-size=800
app.rag.chunk-overlap=100
app.rag.top-k=4

# ── Actuator ──
management.endpoints.web.exposure.include=health,info,metrics,env,beans,mappings,loggers,heapdump
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=always
management.info.env.enabled=true
info.app.name=Spring RAG App
info.app.description=RAG application using Gemini 2.5 Flash + ONNX all-MiniLM-L6-v2
info.app.version=0.0.1-SNAPSHOT
